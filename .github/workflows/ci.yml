name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        # .npmrc enables legacy-peer-deps; respect it
        run: npm ci

      - name: Lint (warning-only — does not fail CI yet)
        run: npm run lint || true

      # Don't fail on the in-progress unified-editor refactor errors;
      # tsc on tests is what we gate on.
      - name: Type-check tests
        run: npx tsc --noEmit -p tsconfig.test.json

      - name: Vitest (api + dom)
        run: npm test

      - name: Build
        run: npx vite build

      - name: Bundle-size budget
        run: npm run check:bundle-size

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright e2e
        # `pretest:e2e` rebuilds; we already built above. Skip the hook
        # by calling playwright directly.
        run: npx playwright test
        env:
          CI: 'true'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
